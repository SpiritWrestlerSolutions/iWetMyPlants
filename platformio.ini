; iWetMyPlants v1.0 - PlatformIO Configuration
; ============================================
; Three build environments: Hub, Remote, Greenhouse Manager
;
; Build numbering
; ---------------
; scripts/version.py runs before every compile and injects:
;   IWMP_VERSION        "1.0.0+<git-commit-count>"
;   IWMP_BUILD_NUMBER   <git-commit-count>   (monotonically increasing)
;   IWMP_BUILD_HASH     "<short-sha>"        (7-char git hash)
;   IWMP_BUILD_DIRTY    0 or 1              (1 = uncommitted changes)
;
; The -DIWMP_VERSION_BASE below is the semantic part only; the script
; combines it with the build number.  Bump IWMP_VERSION_BASE here AND
; in scripts/version.py BASE_VERSION when cutting a release.

[platformio]
default_envs = hub
src_dir = src
include_dir = include

[env]
platform = espressif32
framework = arduino
monitor_speed = 115200
upload_speed = 921600
lib_ldf_mode = deep+
extra_scripts = pre:scripts/version.py
; NOTE: Do NOT use lib_extra_dirs with shared - causes duplicate compilation
; shared code is included via build_src_filter instead
lib_deps =
    bblanchon/ArduinoJson@^7.0.0
    mathieucarbou/ESPAsyncWebServer@^3.3.0
    mathieucarbou/AsyncTCP@^3.3.0
    marvinroger/AsyncMqttClient@^0.9.0
    adafruit/Adafruit ADS1X15@^2.4.0
    adafruit/Adafruit Unified Sensor@^1.1.9
    adafruit/DHT sensor library@^1.4.4
    closedcube/ClosedCube SHT31D@^1.5.1
    DNSServer
    Preferences
    WiFi
    Wire
build_flags =
    -DCORE_DEBUG_LEVEL=1
    -DCONFIG_ASYNC_TCP_RUNNING_CORE=0
    -DCONFIG_ASYNC_TCP_USE_WDT=0
    -DIWMP_VERSION_BASE=\"1.0.0\"
    -DASYNCWEBSERVER_REGEX=1
    -std=gnu++14
    -Os
    -I shared
    -I shared/config
    -I shared/communication
    -I shared/sensors
    -I shared/calibration
    -I shared/web
    -I shared/utils
build_unflags = -std=gnu++11

; ============================================
; HUB - Central coordinator, data aggregator, HA bridge
; Hardware: ESP32-WROOM or ESP32-S3
; ============================================
[env:hub]
board = esp32dev
; For ESP32-S3 use: board = esp32-s3-devkitc-1
; Use huge_app partition: 3MB app space (hub is at flash limit)
board_build.partitions = huge_app.csv
build_flags =
    ${env.build_flags}
    -DIWMP_DEVICE_TYPE=0
    -DIWMP_MAX_SENSORS=16
    -DIWMP_HAS_ESPNOW_RX=1
    -DIWMP_HAS_DEVICE_REGISTRY=1
    -I hub/src
build_src_filter =
    +<../shared/**/*.cpp>
    +<../hub/src/**/*.cpp>
    -<../hub/src/main.cpp>
    +<main_hub.cpp>

[env:hub_debug]
extends = env:hub
build_type = debug
build_flags =
    ${env:hub.build_flags}
    -DCORE_DEBUG_LEVEL=5
    -DIWMP_DEBUG=1

; ============================================
; REMOTE - WiFi sensor node
; Hardware: ESP32-C3 SuperMini (native USB CDC, no UART bridge)
; ============================================
[env:remote]
board = esp32-c3-devkitm-1
; SuperMini uses native USB CDC — route Serial to USB instead of UART0
board_build.arduino.cdc_on_boot = 1
; Use huge_app partition: 3MB app space
board_build.partitions = huge_app.csv
; Prevent serial monitor DTR/RTS from resetting the board
monitor_rts = 0
monitor_dtr = 0
; Ignore environmental sensor libraries not needed by Remote
lib_ignore =
    DHT sensor library
    ClosedCube SHT31D
build_flags =
    ${env.build_flags}
    -DIWMP_DEVICE_TYPE=1
    -DIWMP_MAX_SENSORS=4
    -DIWMP_NO_ENVIRONMENTAL=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -I remote/src
; Explicit whitelist — only include shared code the Remote actually uses.
; Using shared/**/*.cpp would pull in mux, web, ota, calibration, etc.
; and balloon the binary. Keep this list tight.
build_src_filter =
    +<../shared/config/config_manager.cpp>
    +<../shared/communication/wifi_manager.cpp>
    +<../shared/communication/mqtt_manager.cpp>
    +<../shared/communication/espnow_manager.cpp>
    +<../shared/sensors/sensor_interface.cpp>
    +<../shared/sensors/ads1115_moisture.cpp>
    +<../shared/sensors/capacitive_moisture.cpp>
    +<../shared/utils/logger.cpp>
    +<../shared/utils/error_tracker.cpp>
    +<../shared/utils/admin_auth.cpp>
    +<../remote/src/**/*.cpp>
    -<../remote/src/main.cpp>
    +<main_remote.cpp>

[env:remote_debug]
extends = env:remote
build_type = debug
build_flags =
    ${env:remote.build_flags}
    -DCORE_DEBUG_LEVEL=5
    -DIWMP_DEBUG=1

; ============================================
; GREENHOUSE - Environmental control, relay automation
; Hardware: ESP32-WROOM or ESP32-S3
; ============================================
[env:greenhouse]
board = esp32dev
; Use huge_app partition: 3MB app space
board_build.partitions = huge_app.csv
build_flags =
    ${env.build_flags}
    -DIWMP_DEVICE_TYPE=2
    -DIWMP_MAX_SENSORS=4
    -DIWMP_MAX_RELAYS=8
    ; IWMP_MAX_BINDINGS kept for DeviceConfig NVS layout compat only
    -DIWMP_MAX_BINDINGS=8
    -I greenhouse/src
build_src_filter =
    +<../shared/**/*.cpp>
    +<../greenhouse/src/**/*.cpp>
    -<../greenhouse/src/main.cpp>
    +<main_greenhouse.cpp>

[env:greenhouse_debug]
extends = env:greenhouse
build_type = debug
build_flags =
    ${env:greenhouse.build_flags}
    -DCORE_DEBUG_LEVEL=5
    -DIWMP_DEBUG=1
