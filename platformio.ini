; iWetMyPlants v2.0 - PlatformIO Configuration
; ============================================
; Three build environments: Hub, Remote, Greenhouse Manager

[platformio]
default_envs = hub
src_dir = src
include_dir = include

[env]
platform = espressif32
framework = arduino
monitor_speed = 115200
upload_speed = 921600
lib_ldf_mode = deep
lib_deps =
    bblanchon/ArduinoJson@^7.0.0
    mathieucarbou/ESPAsyncWebServer@^3.3.0
    mathieucarbou/AsyncTCP@^3.3.0
    marvinroger/AsyncMqttClient@^0.9.0
    adafruit/Adafruit ADS1X15@^2.4.0
    adafruit/Adafruit Unified Sensor@^1.1.9
    adafruit/DHT sensor library@^1.4.4
    closedcube/ClosedCube SHT31D@^1.5.1
    DNSServer
    Preferences
build_unflags = -std=gnu++11
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DCONFIG_ASYNC_TCP_RUNNING_CORE=0
    -DCONFIG_ASYNC_TCP_USE_WDT=0
    -DIWMP_VERSION=\"2.0.0\"
    -DASYNCWEBSERVER_REGEX=1
    -std=gnu++14
    -I shared
    -I shared/config
    -I shared/communication
    -I shared/sensors
    -I shared/calibration
    -I shared/web
    -I shared/utils

; ============================================
; HUB - Central coordinator, data aggregator, HA bridge
; Hardware: ESP32-WROOM or ESP32-S3
; ============================================
[env:hub]
board = esp32dev
; For ESP32-S3 use: board = esp32-s3-devkitc-1
build_flags =
    ${env.build_flags}
    -DIWMP_DEVICE_TYPE=0
    -DIWMP_MAX_SENSORS=8
    -DIWMP_HAS_ESPNOW_RX=1
    -DIWMP_HAS_DEVICE_REGISTRY=1
    -I hub/src
build_src_filter =
    +<../shared/**/*.cpp>
    +<../hub/src/**/*.cpp>
    -<../hub/src/main.cpp>
    +<main_hub.cpp>

[env:hub_debug]
extends = env:hub
build_type = debug
build_flags =
    ${env:hub.build_flags}
    -DCORE_DEBUG_LEVEL=5
    -DIWMP_DEBUG=1

; ============================================
; REMOTE - Single sensor node, ultra-low power
; Hardware: ESP32-C3 SuperMini
; ============================================
[env:remote]
board = esp32-c3-devkitm-1
; For C3 SuperMini: board = seeed_xiao_esp32c3
build_flags =
    ${env.build_flags}
    -DIWMP_DEVICE_TYPE=1
    -DIWMP_MAX_SENSORS=1
    -DIWMP_HAS_DEEP_SLEEP=1
    -DIWMP_HAS_BATTERY=1
    -I remote/src
build_src_filter =
    +<../shared/**/*.cpp>
    +<../remote/src/**/*.cpp>
    -<../remote/src/main.cpp>
    +<main_remote.cpp>

[env:remote_debug]
extends = env:remote
build_type = debug
build_flags =
    ${env:remote.build_flags}
    -DCORE_DEBUG_LEVEL=5
    -DIWMP_DEBUG=1

; ============================================
; GREENHOUSE - Environmental control, relay automation
; Hardware: ESP32-WROOM or ESP32-S3
; ============================================
[env:greenhouse]
board = esp32dev
build_flags =
    ${env.build_flags}
    -DIWMP_DEVICE_TYPE=2
    -DIWMP_MAX_SENSORS=4
    -DIWMP_MAX_RELAYS=4
    -DIWMP_HAS_AUTOMATION=1
    -I greenhouse/src
build_src_filter =
    +<../shared/**/*.cpp>
    +<../greenhouse/src/**/*.cpp>
    -<../greenhouse/src/main.cpp>
    +<main_greenhouse.cpp>

[env:greenhouse_debug]
extends = env:greenhouse
build_type = debug
build_flags =
    ${env:greenhouse.build_flags}
    -DCORE_DEBUG_LEVEL=5
    -DIWMP_DEBUG=1
