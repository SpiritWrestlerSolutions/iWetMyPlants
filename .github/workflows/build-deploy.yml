name: Build & Deploy Firmware

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    name: Build firmware
    runs-on: ubuntu-latest
    env:
      FTP_SERVER: ${{ secrets.FTP_SERVER }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache PlatformIO packages
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: pio-${{ hashFiles('platformio.ini') }}
          restore-keys: pio-

      - name: Install PlatformIO
        run: pip install platformio

      # ── Build all three targets ──────────────────────────────────────────────

      - name: Build Hub
        run: pio run -e hub

      - name: Build Remote
        run: pio run -e remote

      - name: Build Greenhouse
        run: pio run -e greenhouse

      # ── Extract version from platformio.ini ─────────────────────────────────

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep -oP '(?<=IWMP_VERSION=\\")[^"\\]+' platformio.ini | head -1)
          if [ -z "$VERSION" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          if [ -z "$VERSION" ]; then
            VERSION="dev"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "date=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      # ── Collect binaries ────────────────────────────────────────────────────

      - name: Collect firmware binaries
        run: |
          for ENV in hub remote greenhouse; do
            mkdir -p firmware/$ENV
            cp .pio/build/$ENV/bootloader.bin  firmware/$ENV/
            cp .pio/build/$ENV/partitions.bin  firmware/$ENV/
            cp .pio/build/$ENV/firmware.bin    firmware/$ENV/
          done

      # ── Update installer metadata ────────────────────────────────────────────

      - name: Stamp version into manifests
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          for f in installer/install/*.json; do
            sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" "$f"
          done

      - name: Write version.json
        run: |
          cat > installer/version.json <<EOF
          {
            "version": "${{ steps.version.outputs.version }}",
            "date": "${{ steps.version.outputs.date }}",
            "commit": "${{ github.sha }}",
            "changelog": [
              {
                "version": "${{ steps.version.outputs.version }}",
                "date": "${{ steps.version.outputs.date }}",
                "notes": [
                  "Built from commit ${{ github.sha }}"
                ]
              }
            ]
          }
          EOF

      # ── Upload build artifacts ───────────────────────────────────────────────

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ steps.version.outputs.version }}
          path: firmware/
          retention-days: 30

      - name: Debug installer contents
        run: |
          echo "=== installer/ contents ==="
          ls -la ./installer/
          find ./installer -type f

      # ── Deploy to spiritwrestler.ca ──────────────────────────────────────────

      - name: Deploy installer to /plants/install/
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          ssh_private_key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 27
          local_path: ./installer/
          remote_path: ./public_html/plants/install/

      # Deploy each device subdirectory explicitly — glob wildcard (*) with the
      # SFTP action doesn't reliably preserve subdirectory structure, which
      # caused 404s when the manifest resolved ../../firmware/hub/bootloader.bin.
      - name: Deploy Hub firmware binaries
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          ssh_private_key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 27
          local_path: ./firmware/hub/
          remote_path: ./public_html/plants/firmware/hub/

      - name: Deploy Remote firmware binaries
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          ssh_private_key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 27
          local_path: ./firmware/remote/
          remote_path: ./public_html/plants/firmware/remote/

      - name: Deploy Greenhouse firmware binaries
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          ssh_private_key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 27
          local_path: ./firmware/greenhouse/
          remote_path: ./public_html/plants/firmware/greenhouse/
