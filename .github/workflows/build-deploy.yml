name: Build & Deploy Firmware

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    name: Build firmware
    runs-on: ubuntu-latest
    env:
      FTP_SERVER: ${{ secrets.FTP_SERVER }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache PlatformIO packages
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: pio-${{ hashFiles('platformio.ini') }}
          restore-keys: pio-

      - name: Install PlatformIO
        run: pip install platformio

      # ── Build all three targets ──────────────────────────────────────────────
      - name: Build Hub
        run: pio run -e hub

      - name: Build Remote
        run: pio run -e remote

      - name: Build Greenhouse
        run: pio run -e greenhouse

      # ── Extract version from platformio.ini ─────────────────────────────────
      - name: Extract version
        id: version
        run: |
          VERSION=$(grep -oP '(?<=IWMP_VERSION=\\")[^"\\]+' platformio.ini | head -1)
          if [ -z "$VERSION" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          if [ -z "$VERSION" ]; then
            VERSION="dev"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "date=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      # ── Collect binaries ────────────────────────────────────────────────────
      - name: Collect firmware binaries
        run: |
          for ENV in hub remote greenhouse; do
            mkdir -p firmware/$ENV
            cp .pio/build/$ENV/bootloader.bin  firmware/$ENV/
            cp .pio/build/$ENV/partitions.bin  firmware/$ENV/
            cp .pio/build/$ENV/firmware.bin    firmware/$ENV/
          done

      # ── Update installer metadata ────────────────────────────────────────────
      - name: Stamp version into manifests
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          for f in installer/install/*.json; do
            sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" "$f"
          done

      - name: Write version.json
        run: |
          cat > installer/version.json <<EOF
          {
            "version": "${{ steps.version.outputs.version }}",
            "date": "${{ steps.version.outputs.date }}",
            "commit": "${{ github.sha }}",
            "changelog": [
              {
                "version": "${{ steps.version.outputs.version }}",
                "date": "${{ steps.version.outputs.date }}",
                "notes": [
                  "Built from commit ${{ github.sha }}"
                ]
              }
            ]
          }
          EOF

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ steps.version.outputs.version }}
          path: firmware/
          retention-days: 30

      # ── Deploy to spiritwrestler.ca ──────────────────────────────────────────
      - name: Setup SSH key
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p 27 "${{ secrets.FTP_SERVER }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy to Server
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
        env:
          SFTP_USER: ${{ secrets.FTP_USERNAME }}
          SFTP_HOST: ${{ secrets.FTP_SERVER }}
        run: |
          SFTP="sftp -P 27 -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no"
          ROOT="public_html/plants"

          # Ensure remote directory tree exists (- prefix = ignore error if already exists)
          {
            echo "-mkdir $ROOT/firmware"
            echo "-mkdir $ROOT/firmware/hub"
            echo "-mkdir $ROOT/firmware/remote"
            echo "-mkdir $ROOT/firmware/greenhouse"
          } | $SFTP -b - "$SFTP_USER@$SFTP_HOST"

          # Upload firmware binaries — file-to-file, no directory-to-directory ambiguity
          for ENV in hub remote greenhouse; do
            {
              echo "put .pio/build/$ENV/bootloader.bin $ROOT/firmware/$ENV/bootloader.bin"
              echo "put .pio/build/$ENV/partitions.bin $ROOT/firmware/$ENV/partitions.bin"
              echo "put .pio/build/$ENV/firmware.bin   $ROOT/firmware/$ENV/firmware.bin"
            } | $SFTP -b - "$SFTP_USER@$SFTP_HOST"
          done

          # Upload installer assets
          echo "put installer/index.html    $ROOT/index.html"    | $SFTP -b - "$SFTP_USER@$SFTP_HOST"
          echo "put installer/version.json  $ROOT/version.json"  | $SFTP -b - "$SFTP_USER@$SFTP_HOST"
          echo "put installer/IWMP_Banner.webp $ROOT/IWMP_Banner.webp" | $SFTP -b - "$SFTP_USER@$SFTP_HOST" || true
