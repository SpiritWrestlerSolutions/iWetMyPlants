name: Build & Deploy Firmware

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    name: Build firmware
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache PlatformIO packages
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: pio-${{ hashFiles('platformio.ini') }}
          restore-keys: pio-

      - name: Install PlatformIO
        run: pip install platformio

      # ── Build all three targets ──────────────────────────────────────────────

      - name: Build Hub
        run: pio run -e hub

      - name: Build Remote
        run: pio run -e remote

      - name: Build Greenhouse
        run: pio run -e greenhouse

      # ── Extract version from platformio.ini ─────────────────────────────────

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep -oP '(?<=IWMP_VERSION=\\")[^"\\]+' platformio.ini | head -1)
          if [ -z "$VERSION" ]; then
            # fallback: read from the tag if triggered by a tag push
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          if [ -z "$VERSION" ]; then
            VERSION="dev"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "date=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      # ── Collect binaries ────────────────────────────────────────────────────
      # PlatformIO output for ESP32 (IDF v5):
      #   .pio/build/<env>/bootloader.bin   (bootloader)
      #   .pio/build/<env>/partitions.bin   (partition table)
      #   .pio/build/<env>/firmware.bin     (application)

      - name: Collect firmware binaries
        run: |
          for ENV in hub remote greenhouse; do
            mkdir -p firmware/$ENV
            cp .pio/build/$ENV/bootloader.bin  firmware/$ENV/
            cp .pio/build/$ENV/partitions.bin  firmware/$ENV/
            cp .pio/build/$ENV/firmware.bin    firmware/$ENV/
          done

      # ── Update installer metadata ────────────────────────────────────────────

      - name: Stamp version into manifests
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          for f in installer/manifests/*.json; do
            sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" "$f"
          done

      - name: Write version.json
        run: |
          cat > installer/version.json <<EOF
          {
            "version": "${{ steps.version.outputs.version }}",
            "date": "${{ steps.version.outputs.date }}",
            "commit": "${{ github.sha }}",
            "changelog": [
              {
                "version": "${{ steps.version.outputs.version }}",
                "date": "${{ steps.version.outputs.date }}",
                "notes": [
                  "Built from commit ${{ github.sha }}"
                ]
              }
            ]
          }
          EOF

      # ── Upload build artifacts (always available in GitHub UI) ───────────────

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ steps.version.outputs.version }}
          path: firmware/
          retention-days: 30

      # ── Deploy to spiritwrestler.ca ──────────────────────────────────────────
      # Requires repository secrets:
      #   FTP_SERVER   → your FTP host (e.g. ftp.spiritwrestler.ca)
      #   FTP_USERNAME → FTP account username
      #   FTP_PASSWORD → FTP account password
      #
      # Only runs on pushes to main or tag pushes (not PRs).

      - name: Deploy installer to /plants/install/
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: /plants/install/
          local-dir: ./installer/

      - name: Deploy firmware binaries to /plants/firmware/
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: /plants/firmware/
          local-dir: ./firmware/
