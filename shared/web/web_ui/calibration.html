<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calibration | iWetMyPlants</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="app-header">
        <h1>Sensor Calibration</h1>
        <a href="/" class="btn-secondary">← Dashboard</a>
    </header>

    <main class="container">
        <section class="card shadow">
            <label for="sensor-select">Active Sensor</label>
            <select id="sensor-select" class="form-control">
                <option value="" disabled selected>Loading sensors...</option>
            </select>
        </section>

        <section class="card shadow" id="calibration-ui">
            <header class="card-header">
                <h2>Live Monitoring</h2>
                <div id="connection-badge" class="badge">Connecting...</div>
            </header>

            <div class="stats-grid">
                <div class="stat-item">
                    <small>Raw Value</small>
                    <output id="raw-value">0</output>
                </div>
                <div class="stat-item">
                    <small>10s Average</small>
                    <output id="avg-value">0</output>
                </div>
                <div class="stat-item">
                    <small>Moisture</small>
                    <output id="percent-value">0%</output>
                </div>
            </div>

            <canvas id="reading-graph" height="120"></canvas>
        </section>

        <div class="grid-2-col">
            <section class="card cal-box">
                <h3>1. Dry Point</h3>
                <p class="help-text">Sensor in open air.</p>
                <div class="value-row">
                    <span>Saved: <strong id="dry-saved">--</strong></span>
                    <button id="btn-set-dry" class="btn-primary">Set Current</button>
                </div>
            </section>

            <section class="card cal-box">
                <h3>2. Wet Point</h3>
                <p class="help-text">Submerged in water.</p>
                <div class="value-row">
                    <span>Saved: <strong id="wet-saved">--</strong></span>
                    <button id="btn-set-wet" class="btn-primary">Set Current</button>
                </div>
            </section>
        </div>

        <footer class="action-bar">
            <button id="btn-reset" class="btn-outline">Reset Defaults</button>
            <button id="btn-save" class="btn-success" disabled>Commit Calibration</button>
        </footer>
    </main>

    <script src="calibration.js"></script>
</body>
</html>
